<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA & Apple Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f472b6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PersonalDiet" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/000000/salad.png" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>PersonalDiet — Cardápios Clínicos Inteligentes</title>
  </head>
  <body class="bg-[#fafaf9] text-gray-800 antialiased font-body">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then((reg) => {
              console.log("Service Worker registrado com sucesso:", reg.scope);
              
              // Force checking for updates immediately on load
              reg.update();

              // If there's a new version waiting to activate, trigger SKIP_WAITING
              if (reg.waiting) {
                reg.waiting.postMessage({ type: "SKIP_WAITING" });
              }

              // Listen for update found
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === "installed" && navigator.serviceWorker.controller) {
                      console.log("Novo Service Worker detectado, ativando...");
                      installingWorker.postMessage({ type: "SKIP_WAITING" });
                    }
                  };
                }
              };
            })
            .catch((err) => console.log("Falha ao registrar Service Worker:", err));
        });

        // Whenever the new worker takes control, trigger an immediate seamless refresh to apply fixes
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (!refreshing) {
            refreshing = true;
            console.log("Recarregando para aplicar correções críticas do PWA.");
            window.location.reload();
          }
        });
      }
    </script>
  </body>
</html>
